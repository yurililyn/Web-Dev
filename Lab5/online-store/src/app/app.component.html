<header>
  <h1>Kaspi Kz</h1>
  <nav>
    <button *ngFor="let cat of categories" 
            (click)="selectCategory(cat)"
            [class.active]="selectedCategory === cat">
      {{ cat.name }}
    </button>
  </nav>
</header>

<main>
  <app-product-list *ngIf="selectedCategory" [products]="visibleProducts"></app-product-list>
</main>
