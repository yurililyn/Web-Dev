<div class="card">
  <img [src]="product.image" class="main-img" alt="product">
  
  <div class="gallery">
    @for (img of product.images; track img) {
      <img [src]="img" 
           class="thumb-img" 
           (click)="changeImage(img)" 
           alt="thumbnail">
    }
  </div>

  <div class="details">
    <h3>{{ product.name }}</h3>
    <p class="desc">{{ product.description }}</p>
    
    <div class="meta">
      <span class="rating">⭐ {{ product.rating }}</span>
      <span class="price">{{ product.price | number }} ₸</span>
    </div>
    
    <div class="actions">
      <button (click)="likeProduct()" class="like-btn">❤️ {{ product.likes }}</button>
      <button (click)="removeProduct()" class="delete-btn">Delete</button>
    </div>
    
    <div class="buttons">
      <a [href]="product.link" target="_blank" class="buy-link">Kaspi</a>
      <button (click)="shareTelegram()" class="share-btn">Share</button>
    </div>
  </div>
</div>
